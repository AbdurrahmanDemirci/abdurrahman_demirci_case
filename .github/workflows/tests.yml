name: Test Suite

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'ui_tests/**'
      - 'api_tests/**'
      - 'load_tests/**'
      - 'locust.conf'
      - 'requirements.txt'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'ui_tests/**'
      - 'api_tests/**'
      - 'load_tests/**'
      - 'locust.conf'
      - 'requirements.txt'
      - '.github/workflows/tests.yml'

jobs:
  # ── UI Tests ────────────────────────────────────────────────────────────────
  ui-tests:
    name: UI Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run UI Tests — ${{ matrix.browser }} (headless)
        run: pytest ui_tests/tests/ --browser=${{ matrix.browser }} --headless=true --alluredir=automation-test-results/ui/allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui-${{ matrix.browser }}
          path: automation-test-results/ui/allure-results/
          retention-days: 7

  # ── API Tests ───────────────────────────────────────────────────────────────
  api-tests:
    name: API Tests (Petstore Pet CRUD)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run API Tests
        run: pytest api_tests/tests/ --alluredir=automation-test-results/api/allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: automation-test-results/api/allure-results/
          retention-days: 7

  # ── Load Tests ──────────────────────────────────────────────────────────────
  load-tests:
    name: Load Tests (n11.com search)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Load Tests (1 user, 60s, headless)
        run: |
          mkdir -p automation-test-results/locust
          locust --headless --html automation-test-results/locust/locust_report.html --csv automation-test-results/locust/locust

      - name: Upload Locust results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-results
          path: automation-test-results/locust/
          retention-days: 7
